<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVT Admin - Quản Lý Kho Hàng</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');

        :root {
            --primary-color: #f1c40f; 
            --accent-color: #d4af37; 
            --bg-dark: #121212;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            background-color: var(--bg-dark);
            color: white;
        }

        /* NÚT TRỞ VỀ SHOP */
        .top-header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 5px;
        }

        .back-btn {
            background: rgba(0, 0, 0, 0.6);
            color: var(--primary-color);
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid var(--accent-color);
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: var(--accent-color);
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(212, 175, 55, 0.4);
        }

        h1 { 
            color: var(--primary-color); 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            font-family: 'UTM Thu Phap', 'VNI-Thufap', 'Dancing Script', cursive;
            font-size: 3.5rem;
            margin: 10px 0;
            text-align: center;
        }

        .admin-container {
            background: var(--card-bg);
            border: 2px solid var(--accent-color);
            border-radius: 15px;
            padding: 25px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-bottom: 30px;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #aaa; font-size: 0.9rem; }
        
        .form-group input, .form-group select { 
            width: 100%; padding: 10px; border: 1px solid #444; 
            border-radius: 6px; box-sizing: border-box;
            background-color: #1a1a1a; color: white;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: var(--primary-color);
        }

        .full-width { grid-column: 1 / -1; }

        .btn-group {
            display: flex; gap: 10px; margin-top: 10px;
        }

        .main-btn {
            background: linear-gradient(to bottom, #f1c40f, #d4af37);
            color: #000; border: none; padding: 12px; font-size: 1rem;
            border-radius: 6px; font-weight: bold; cursor: pointer;
            flex: 2; transition: 0.3s;
        }

        .main-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* PHẦN BẢNG DANH SÁCH */
        .table-container {
            width: 100%;
            max-width: 900px;
            background: #1a1a1a;
            border: 1px solid var(--accent-color);
            border-radius: 10px;
            overflow: hidden;
        }

        .table-header {
            background: #252525;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--accent-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: #ddd;
            font-size: 0.9rem;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th { background: #222; color: var(--primary-color); }
        
        .code-cell {
            font-family: monospace;
            color: #2ecc71;
            background: #000;
            padding: 5px;
            border-radius: 4px;
            word-break: break-all;
        }

        .action-btns {
            display: flex; gap: 10px;
        }

        .btn-clear { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s;}
        .btn-download { background: #27ae60; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s;}
        
        .btn-clear:hover { background: #c0392b; transform: translateY(-1px);}
        .btn-download:hover { background: #219150; transform: translateY(-1px);}
    </style>
</head>
<body>

    <div class="top-header">
        <a href="index.html" class="back-btn">
            ⬅ Trở về Lạc Vân Thương Hội
        </a>
    </div>

    <h1>Quản Lý Lạc Vân Thương</h1>

    <div class="admin-container">
        <div class="input-grid">
            <div class="form-group full-width">
                <label>🖼️ Chọn ảnh mặt hàng (Chỉ lấy tên):</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>

            <div class="form-group full-width">
                <label>📜 Tên / Mô tả mặt hàng:</label>
                <input type="text" id="descInput" placeholder="Ví dụ: Hoàng Thiên Mộng Liêm +10">
            </div>

            <div class="form-group">
                <label>💰 Giá VNĐ:</label>
                <input type="text" id="vndInput" placeholder="VD: 600.000 VNĐ">
            </div>

            <div class="form-group">
                <label>💎 Giá Linh Thạch:</label>
                <input type="text" id="ltInput" placeholder="VD: 25.000.000 linh thạch">
            </div>

            <div class="form-group">
                <label>📦 Tồn kho:</label>
                <input type="text" id="stockInput" placeholder="VD: 150">
            </div>

            <div class="form-group">
                <label>📂 Danh mục:</label>
                <select id="catInput">
                    <option value="Vũ khí & giáp">Vũ khí & giáp</option>
                    <option value="Pháp bảo">Pháp bảo</option>
                    <option value="Nguyên liệu">Nguyên liệu</option>
                    <option value="Tiền tệ">Tiền tệ</option>
                    <option value="Phó bản">Phó bản</option>
                    <option value="Combo giảm giá">Combo giảm giá</option>
                </select>
            </div>
        </div>

        <div class="btn-group">
            <button class="main-btn" onclick="addItem()">⚡ LÊN HÀNG (THÊM VÀO BẢNG)</button>
        </div>
    </div>

    <div class="table-container">
        <div class="table-header">
            <span style="font-weight: bold; color: var(--primary-color);">DANH SÁCH MÃ SẢN PHẨM</span>
            <div class="action-btns">
                <button class="btn-clear" onclick="clearTable()">🗑️ XÓA HẾT</button>
                <button class="btn-download" onclick="downloadFile()">💾 TẢI FILE .TXT</button>
            </div>
        </div>
        <table id="productTable">
            <thead>
                <tr>
                    <th width="50">STT</th>
                    <th>Mã chuẩn hóa (Copy dán vào rawData)</th>
                    <th width="100">Danh mục</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <script>
        let listHang = [];

        function addItem() {
            const imgFile = document.getElementById('imageInput').files[0];
            const desc = document.getElementById('descInput').value.trim();
            const vnd = document.getElementById('vndInput').value.trim();
            const lt = document.getElementById('ltInput').value.trim();
            const stock = document.getElementById('stockInput').value.trim();
            const cat = document.getElementById('catInput').value;

            if (!desc || !stock) {
                alert("Thiếu Tên hoặc Tồn kho rồi đạo hữu!");
                return;
            }

            let imgName = imgFile ? imgFile.name : "chua_co_anh.png";
            
            // Tạo dòng code chuẩn
            const codeString = `"${imgName}, ${desc}, ${stock}, ${vnd}, ${lt}, ${cat}"`;
            
            // Lưu vào mảng
            listHang.push({ code: codeString, category: cat });
            
            renderTable();
            
            // Reset form nhẹ nhàng
            document.getElementById('descInput').value = "";
            document.getElementById('vndInput').value = "";
            document.getElementById('ltInput').value = "";
            document.getElementById('stockInput').value = "";
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";
            
            listHang.forEach((item, index) => {
                const row = `<tr>
                    <td>${index + 1}</td>
                    <td class="code-cell">${item.code},</td>
                    <td>${item.category}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        function clearTable() {
            if(confirm("Xóa sạch danh sách này để làm lại từ đầu?")) {
                listHang = [];
                renderTable();
            }
        }

        function downloadFile() {
            if (listHang.length === 0) {
                alert("Bảng đang trống, chưa có hàng để tải về!");
                return;
            }

            // Tạo nội dung file
            const content = listHang.map(item => item.code + ",").join("\n");
            
            // Lấy thời gian hiện tại cho tên file
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const mmonth = String(now.getMonth() + 1).padStart(2, '0');
            const yyyy = now.getFullYear();
            
            const fileName = `list_hang_${hh}:${mm}_${dd}${mmonth}${yyyy}.txt`;

            // Xử lý tải file
            const blob = new Blob([content], { type: "text/plain" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            link.click();
            URL.revokeObjectURL(link.href);
        }
    </script>
</body>
</html>

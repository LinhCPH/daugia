<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sàn Đấu Giá LVT - Hệ Thống Đặt Hàng</title>
    <style>
        :root {
            --primary-color: #f1c40f; 
            --accent-color: #d4af37; 
            --title-color: #ffffff; 
            --bg-overlay: rgba(0, 0, 0, 0.4); 
            --card-bg: rgba(255, 255, 255, 0.95);
            --modal-bg: rgba(0, 0, 0, 0.9);
            --buy-btn-color: #27ae60; /* Màu xanh lá cho nút Mua */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; position: relative;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('anhnen.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            filter: blur(2px) brightness(0.9); z-index: -2;
        }

        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-overlay); z-index: -1;
        }

        h1 { 
            color: var(--title-color); margin-bottom: 40px; text-transform: uppercase;
            letter-spacing: 2px; text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            border-bottom: 3px solid var(--accent-color); padding-bottom: 10px;
        }

        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; width: 100%; max-width: 1200px;
        }

        .product-card {
            background: var(--card-bg); border-radius: 15px; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: all 0.3s ease;
            display: flex; flex-direction: column; border: 3px solid var(--accent-color);
            position: relative;
        }

        .product-card:hover { transform: translateY(-8px); border-color: #f1c40f; }

        .product-card::before {
            content: "LVT"; position: absolute; top: 10px; right: -30px;
            background-color: var(--accent-color); color: #fff; padding: 5px 35px;
            transform: rotate(45deg); font-size: 0.75rem; font-weight: bold; z-index: 10;
        }

        .product-image {
            width: 100%; height: 200px; object-fit: cover; 
            border-bottom: 2px solid var(--accent-color); cursor: pointer;
        }

        .product-info { padding: 15px; text-align: center; }

        .product-price { font-size: 1.1rem; font-weight: bold; color: var(--accent-color); margin: 5px 0; }

        .product-desc { font-size: 0.9rem; color: #444; height: 50px; overflow: hidden; margin-bottom: 15px; }

        /* --- NÚT MUA NGAY --- */
        .buy-btn {
            background-color: var(--accent-color);
            color: white; border: none; padding: 10px 20px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: background 0.2s; width: 100%;
        }

        .buy-btn:hover { background-color: #f1c40f; color: #000; }

        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: var(--modal-bg);
            justify-content: center; align-items: center; backdrop-filter: blur(8px);
        }

        .modal-content { max-width: 90%; max-height: 90%; border: 4px solid var(--accent-color); }

        .close-btn { position: absolute; top: 20px; right: 35px; color: white; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>LẠC VÂN THƯƠNG HỘI</h1>

    <div class="grid-container" id="product-grid"></div>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="fullImage">
    </div>

    <script>
        // CHÈN LINK WEBHOOK CỦA BẠN VÀO ĐÂY
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1494077464102568097/oG4QV87lTbZ1XKG3HhAYW7sngyJvqwhq43atabQSgE6tQetcvyEwmQ9eOVvexWYTI6jE";

        const products = [
            { image: "html.png", price: "600.000 VNĐ", desc: "Hoàng Thiên Mộng Liêm +10 1 dòng thần" },
            { image: "daychuyentheluc.png", price: "100.000 VNĐ", desc: "Pháo bảo Dây chuyền thể lực" },
            { image: "nguclongthiet.png", price: "250.000 VNĐ", desc: "Pháo bảo Ngục Long Thiết +20" },
            // ... Bạn hãy thêm lại đầy đủ các mặt hàng của bạn vào đây ...
        ];

        const grid = document.getElementById('product-grid');

        function renderProducts() {
            grid.innerHTML = products.map((item, index) => `
                <div class="product-card">
                    <img src="${item.image}" alt="Sản phẩm" class="product-image" onclick="openModal('${item.image}')">
                    <div class="product-info">
                        <div class="product-price">${item.price}</div>
                        <div class="product-desc">${item.desc}</div>
                        <button class="buy-btn" onclick="buyItem('${item.desc}', '${item.price}')">MUA NGAY</button>
                    </div>
                </div>
            `).join('');
        }

        // Hàm gửi tin nhắn về Discord
        function buyItem(name, price) {
            if (!DISCORD_WEBHOOK_URL || DISCORD_WEBHOOK_URL.includes("DÁN_LINK")) {
                alert("Lỗi: Bạn chưa cài đặt Webhook URL trong code!");
                return;
            }

            const message = {
                content: "🔔 **CÓ ĐƠN HÀNG MỚI!**",
                embeds: [{
                    title: "Người dùng muốn mua vật phẩm",
                    color: 15844367, // Màu vàng Gold
                    fields: [
                        { name: "Vật phẩm", value: name, inline: true },
                        { name: "Giá niêm yết", value: price, inline: true }
                    ],
                    footer: { text: "Yêu cầu từ trang web đấu giá LVT" },
                    timestamp: new Date()
                }]
            };

            fetch(DISCORD_WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(message)
            })
            .then(response => {
                if (response.ok) {
                    alert("Yêu cầu mua hàng đã được gửi đến Discord của LVT! Vui lòng chờ phản hồi.");
                } else {
                    alert("Gửi yêu cầu thất bại. Vui lòng thử lại sau.");
                }
            })
            .catch(error => {
                console.error("Lỗi:", error);
                alert("Có lỗi xảy ra khi kết nối với Discord.");
            });
        }

        function openModal(imageSrc) {
            document.getElementById('imageModal').style.display = "flex";
            document.getElementById('fullImage').src = imageSrc;
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = "none";
        }

        renderProducts();
    </script>
</body>
</html>

        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');

        :root {
            --primary-color: #f1c40f; 
            --accent-color: #d4af37; 
            --title-color: #ffffff; 
            --bg-overlay: rgba(0, 0, 0, 0.4); 
            --card-bg: rgba(255, 255, 255, 0.98);
            --modal-bg: rgba(0, 0, 0, 0.9);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; position: relative;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('anhnen.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            filter: blur(2px) brightness(0.9); z-index: -2;
        }

        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-overlay); z-index: -1;
        }

        /* --- HEADER --- */
        .top-header {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: 1300px; padding: 10px 20px;
            background: rgba(0, 0, 0, 0.6); border: 2px solid var(--accent-color);
            border-radius: 12px; margin-bottom: 20px; box-sizing: border-box;
            backdrop-filter: blur(5px);
        }

        .header-left { 
            display: flex; align-items: center; gap: 15px; 
            text-decoration: none; transition: 0.3s; 
        }
        
        .header-left:hover { transform: scale(1.02); }
        
        .header-logo { 
            width: 45px; height: 45px; border-radius: 50%; 
            border: 2px solid var(--primary-color); object-fit: cover; 
            cursor: pointer; transition: transform 0.3s;
        }
        
        .header-logo:hover { transform: scale(1.1); box-shadow: 0 0 10px var(--primary-color); }
        
        .header-text { 
            color: white; font-weight: bold; font-size: 0.95rem; 
            text-shadow: 1px 1px 3px black; transition: 0.3s; cursor: pointer;
        }
        
        .header-left:hover .header-text { color: var(--primary-color); }

        /* Group cho các nút bên phải */
        .header-right-group {
            display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
        }

        .header-right {
            background: linear-gradient(to bottom, #f1c40f, #d4af37); color: #000;
            text-decoration: none; padding: 8px 18px; border-radius: 8px; font-weight: bold;
            transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            text-align: center; white-space: nowrap;
        }
        
        .header-right:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* FONT THƯ PHÁP */
        h1 { 
            color: var(--primary-color); 
            margin-bottom: 20px; 
            letter-spacing: 3px; 
            text-shadow: 3px 3px 10px rgba(0,0,0,0.9);
            border-bottom: 3px solid var(--accent-color); 
            padding-bottom: 10px;
            text-align: center;
            font-family: 'UTM Thu Phap', 'VNI-Thufap', 'Dancing Script', cursive;
            font-size: 3.8rem;
            font-weight: 700;
        }

        /* THIẾT LẬP THANH MENU & DROPDOWN */
        .top-menu {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1300px;
        }

        .menu-item {
            background: rgba(0, 0, 0, 0.6);
            color: var(--title-color);
            padding: 10px 20px;
            border: 2px solid var(--accent-color);
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.9rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .menu-item:hover, .menu-item.active {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            transform: translateY(-2px);
        }

        /* DROPDOWN ĐÃ ĐƯỢC NÂNG CẤP CHỐNG RỚT CHUỘT */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown::after {
            content: ""; position: absolute; bottom: -20px; left: 0;
            width: 100%; height: 20px; background: transparent; z-index: 3001;
        }

        .dropdown-content {
            visibility: hidden; opacity: 0; position: absolute;
            background-color: rgba(0, 0, 0, 0.85); min-width: 220px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5); z-index: 3000;
            border: 2px solid var(--accent-color); border-radius: 8px;
            top: 100%; left: 0; margin-top: 10px; overflow: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease; 
        }

        .dropdown-content a {
            color: var(--title-color); padding: 12px 16px; text-decoration: none;
            display: block; font-weight: bold; font-size: 0.9rem; transition: 0.3s;
        }

        .dropdown-content a:hover { background-color: var(--accent-color); color: #000; }
        .dropdown:hover .dropdown-content { visibility: visible; opacity: 1; }

        /* THIẾT LẬP 4 MẶT HÀNG TRÊN 1 HÀNG */
        .grid-container {
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 20px; width: 100%; max-width: 1300px; padding: 10px 0 20px 0;
        }

        .product-card {
            background: var(--card-bg); border-radius: 15px; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; flex-direction: column; border: 3px solid var(--accent-color);
            position: relative; height: 100%; z-index: 1;
        }

        .product-card:hover {
            transform: translateY(-15px) scale(1.03); border-color: #f1c40f;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 20px rgba(212, 175, 55, 0.4); z-index: 10;
        }

        .product-card::before {
            content: "LVT"; position: absolute; top: 10px; right: -30px;
            background-color: var(--accent-color); color: #fff; padding: 5px 35px;
            transform: rotate(45deg); font-size: 0.75rem; font-weight: bold; z-index: 11;
        }

        .product-image {
            width: 100%; height: 160px; object-fit: cover; 
            border-bottom: 2px solid var(--accent-color); cursor: pointer;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-image { transform: scale(1.1); }

        .product-info { padding: 12px; display: flex; flex-direction: column; flex-grow: 1; }
        .product-desc { font-size: 0.9rem; color: #333; font-weight: 600; margin-bottom: 5px; text-align: center; }
        .stock-label { font-size: 0.8rem; color: #666; text-align: center; margin-bottom: 10px; }
        .card-footer { margin-top: auto; padding-top: 10px; border-top: 1px dashed #ccc; text-align: center; }
        .price-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        .price-item { display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 0.85rem; font-weight: bold; }
        .no-entry-icon { width: 16px; height: 16px; }

        .buy-btn {
            background: linear-gradient(to bottom, #f1c40f, #d4af37); color: #000; border: none; padding: 8px 15px;
            border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s;
        }
        .buy-btn:hover { filter: brightness(1.2); }

        /* RESPONSIVE */
        @media (max-width: 1100px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { 
            .top-header { flex-direction: column; gap: 15px; text-align: center; }
            .header-left { flex-direction: column; gap: 10px; }
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 10px; } 
            .menu-item { padding: 8px 12px; font-size: 0.8rem; }
        }

        /* MODAL */
        .order-modal, .img-modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.85);

        .order-content {
            background: white; padding: 25px; border-radius: 15px;

        .order-content h2 { margin-top: 0; color: #d4af37; text-align: center; font-size: 1.2rem; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        .form-group input[type="text"], .form-group input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .payment-box { background: #f9f9f9; padding: 10px; border-radius: 8px; margin: 15px 0; border: 1px solid #eee; }
        .confirm-btn { background-color: #27ae60; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .cancel-btn { background: none; color: #777; border: none; width: 100%; margin-top: 10px; cursor: pointer; text-decoration: underline; font-size: 0.85rem; }
        .img-modal img { max-width: 90%; max-height: 90%; border: 3px solid gold; }
    </style>
</head>

            grid.innerHTML = filteredProducts.map((item) => {
                const vndDisplay = item.priceVND 
                    ? `<span style="color:#e74c3c">💰 ${item.priceVND}</span>` 
                    : `<span><img src="no_entry.png" class="no-entry-icon"></span>`;
                const ltDisplay = item.priceLT 
                    ? `<span style="color:#2980b9">💎 ${item.priceLT}</span>` 
                    : `<span><img src="no_entry.png" class="no-entry-icon"></span>`;

                return `
                <div class="product-card">
                    <img src="${item.image}" class="product-image" onclick="openImg('${item.image}')">
                    <div class="product-info">
                        <div class="product-desc">${item.desc}</div>
                        <div class="stock-label">Tồn kho: ${item.stock}</div>
                        <div class="card-footer">
                            <div class="price-row">
                                <div class="price-item">${vndDisplay}</div>
                                <div class="price-item">${ltDisplay}</div>
                            </div>
                            <button class="buy-btn" onclick="openOrderModal(${item.id})">MUA NGAY</button>
                        </div>
                    </div>
                </div>`
            }).join('');
        }

        function openOrderModal(id) {
            currentProduct = products[id];
            document.getElementById('targetItem').innerText = currentProduct.desc;
            document.getElementById('maxStockLabel').innerText = currentProduct.stock;
            document.getElementById('quantityInput').value = 1;

            let payHTML = '<p style="margin:0 0 10px 0; font-size:0.85rem; font-weight:bold;">Phương thức thanh toán:</p>';
            if (currentProduct.priceVND) payHTML += `<label style="display:block; margin-bottom:5px; cursor:pointer;"><input type="radio" name="payType" value="Tiền mặt" checked> Tiền mặt (${currentProduct.priceVND})</label>`;
            if (currentProduct.priceLT) {
                const isChecked = !currentProduct.priceVND ? 'checked' : '';
                payHTML += `<label style="display:block; cursor:pointer;"><input type="radio" name="payType" value="Linh thạch" ${isChecked}> Linh thạch (${currentProduct.priceLT})</label>`;
            }
            document.getElementById('paymentOptions').innerHTML = payHTML;
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeOrderModal() {
            document.getElementById('orderModal').style.display = 'none';
            document.getElementById('discordInput').value = '';
            document.getElementById('ignInput').value = '';
            document.getElementById('quantityInput').value = 1;
        }

        function showNotice(msg) {
            document.getElementById('noticeMessage').innerText = msg;
            document.getElementById('noticeModal').style.display = 'flex';
        }

        function closeNotice() { document.getElementById('noticeModal').style.display = 'none'; }

        function submitOrder() {
            const discordName = document.getElementById('discordInput').value.trim();
            const ign = document.getElementById('ignInput').value.trim() || "Không điền";
            const payType = document.querySelector('input[name="payType"]:checked')?.value;
            
            const buyQty = parseInt(document.getElementById('quantityInput').value);
            const stockQty = parseInt(currentProduct.stock);

            if (!discordName) { showNotice("Bạn bắt buộc phải nhập tên Discord để chúng tôi liên hệ!"); return; }
            if (isNaN(buyQty) || buyQty < 1) { showNotice("Vui lòng nhập số lượng mua hợp lệ!"); return; }
            if (buyQty > stockQty) { showNotice("Số lượng mua không được vượt quá tồn kho hiện có!"); return; }

            const data = {
                content: "🔔 **YÊU CẦU MUA HÀNG MỚI!**",
                embeds: [{
                    title: "Thông Tin Đơn Hàng",
                    color: 15844367,
                    fields: [
                        { name: "Tên Discord", value: discordName, inline: true },
                        { name: "Tên In-game", value: ign, inline: true },
                        { name: "Vật phẩm", value: currentProduct.desc, inline: false },
                        { name: "Số lượng mua", value: buyQty.toString(), inline: true },
                        { name: "Thanh toán bằng", value: payType, inline: true },
                        { name: "Tồn kho hiện tại", value: currentProduct.stock, inline: true }
                    ],
                    footer: { text: "LVT Market System" },
                    timestamp: new Date()
                }]
            };

            fetch(DISCORD_WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
            .then(() => { showNotice("Yêu cầu đã được gửi! LVT sẽ chủ động nhắn tin cho bạn qua Discord."); closeOrderModal(); })
            .catch(() => showNotice("Lỗi kết nối!"));
        }

        function openImg(src) {
            document.getElementById('fullImage').src = src;
            document.getElementById('imageModal').style.display = 'flex';
        }

        // --- HÀM MỚI: Click Logo chuyển về intro.html với delay 0.5s ---
        function goToIntro(event) {
            if(event) event.stopPropagation(); // Tránh sự kiện nhấp đè lên link cha nếu có
            setTimeout(() => {
                window.location.href = "intro.html";
            }, 500);
        }
        
        renderProducts();
    </script>
</body>
</html>

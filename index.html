<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Mục Đấu Giá / Mặt Hàng</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: var(--primary-color); margin-bottom: 30px; }

        /* Lưới hiển thị các ô vuông */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        /* Phong cách từng ô mặt hàng */
        .product-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover; /* Giúp ảnh luôn vuông vắn dù gốc là kích thước nào */
            background-color: #ddd;
        }

        .product-info {
            padding: 15px;
            text-align: center;
        }

        .product-price {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
            margin: 10px 0;
        }

        .product-desc {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.4;
        }

        /* Responsive cho điện thoại */
        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 10px;
            }
            .product-image { height: 150px; }
        }
    </style>
</head>
<body>

    <h1>DANH SÁCH MẶT HÀNG</h1>

    <div class="grid-container" id="product-grid">
        </div>

    <script>
        // ================= SCETION TÙY CHỈNH DỄ DÀNG =================
        // Bạn chỉ cần thêm hoặc sửa các dòng ở dưới đây:
        const products = [
            {
                image: "https://via.placeholder.com/300", // Thay link ảnh vào đây
                price: "1.500.000 VNĐ",
                desc: "Đồng hồ cổ phiên bản giới hạn, còn mới 99%."
            },
            {
                image: "https://via.placeholder.com/300/e74c3c/ffffff",
                price: "500.000 VNĐ",
                desc: "Máy pha cà phê mini cầm tay tiện lợi."
            },
            {
                image: "https://via.placeholder.com/300/2ecc71/ffffff",
                price: "2.300.000 VNĐ",
                desc: "Giày thể thao chuyên dụng chạy bộ."
            },
            // Muốn thêm món mới? Bạn chỉ việc copy cụm { ... } ở trên rồi dán xuống dưới.
        ];
        // =============================================================

        const grid = document.getElementById('product-grid');

        function renderProducts() {
            grid.innerHTML = products.map(item => `
                <div class="product-card">
                    <img src="${item.image}" alt="Sản phẩm" class="product-image">
                    <div class="product-info">
                        <div class="product-price">${item.price}</div>
                        <div class="product-desc">${item.desc}</div>
                    </div>
                </div>
            `).join('');
        }

        renderProducts();
    </script>
</body>
</html>
